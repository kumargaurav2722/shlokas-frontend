<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1" />
    </radialGradient>
    <filter id="omShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Om symbol in yellow -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="160" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#FFD700" filter="url(#omShadow)">ॐ</text>
  
</svg>
