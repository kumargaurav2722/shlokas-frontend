name: Add To Project

on:
  issues:
    types:
      - opened
      - reopened
      - labeled
      - transferred
  pull_request:
    types:
      - opened
      - reopened
      - labeled

jobs:
  add-to-project:
    if: ${{ vars.GITHUB_PROJECT_URL != '' && secrets.ADD_TO_PROJECT_PAT != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Add issue or pull request to GitHub Project
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.GITHUB_PROJECT_URL }}
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
