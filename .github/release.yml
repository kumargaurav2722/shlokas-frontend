changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot[bot]
  categories:
    - title: Features
      labels:
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - documentation
    - title: UI and Experience
      labels:
        - ui/ux
        - frontend
    - title: Auth and User Flows
      labels:
        - auth
    - title: Chat and Search
      labels:
        - chat
    - title: Infra and Security
      labels:
        - infra
        - security
        - dependencies
    - title: Other Changes
      labels:
        - "*"
